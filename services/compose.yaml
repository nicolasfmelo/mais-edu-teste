services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mais_a_educ
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mais_a_educ"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  back-end:
    build:
      context: .
      dockerfile: back-end/Dockerfile
    environment:
      LLM_PROXY_TEST_API_KEY: "dummy-key-for-testing"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/mais_a_educ
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: mais-a-educ
      DATASETS_DIR: /app/datasets
      INSTITUTION_PROFILE_PATH: /app/back-end/institution-profile.md
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://0.0.0.0:8080
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  front-end:
    build:
      context: .
      dockerfile: front-end/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - back-end
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
